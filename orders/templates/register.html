<h2>註冊帳號</h2>

{% if error %}
    <p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <input type="text" name="username" placeholder="帳號名稱">
    <br><br>

    <input type="password" name="password" placeholder="密碼">
    <br><br>

    <button type="submit">註冊</button>
</form>

<br>
<a href="/">回首頁</a>
